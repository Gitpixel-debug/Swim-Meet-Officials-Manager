{% extends "meets/layout.html" %}

{% block title %}Join a Session{% endblock %}

{% block body %}

<div class="container d-flex align-items-center justify-content-center" style="min-height:60vh">
    <div class="card p-4 shadow-sm" style="max-width:520px; width:100%" data-aos="fade-up">
        <h3 class="mb-3">Join a Session</h3>

        {% if message %}
            <div class="alert alert-warning">{{ message }}</div>
        {% endif %}

        <form action="{% url 'join-meet' %}" method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label for="join_code" class="form-label">Enter the Session Join Code:</label>
                <input type="text" id="join_code" name="join_code" class="form-control" placeholder="e.g., ABC12345" required>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-custom btn-official">Join Session</button>
                <a href="{% url 'official-dashboard' %}" class="btn btn-outline-secondary">Back to Dashboard</a>
            </div>
        </form>
    </div>
</div>

{% endblock %}
