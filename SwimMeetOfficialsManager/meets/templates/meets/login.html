{% extends "meets/layout.html" %}

{% block title %}Referee Login{% endblock %}

{% block body %}

<div class="container d-flex align-items-center justify-content-center" style="min-height:60vh">
    <div class="card p-4 shadow-sm" style="max-width:480px; width:100%" data-aos="fade-up">
        <h3 class="mb-3">Referee Login (Email code)</h3>

                {% if message %}
                    <div class="alert alert-warning">{{ message }}</div>
                {% endif %}

                <div id="email-login-area">
                    <form id="request-code-form" method="post" action="{% url 'request-login-code' %}">
                        {% csrf_token %}
                        <div class="mb-3">
                            <input id="email-input" autofocus class="form-control" type="email" name="email" placeholder="Email address" value="{{ email|default:'' }}" required>
                        </div>
                        <div class="mb-3 d-flex gap-2">
                            <button id="request-code-btn" type="submit" class="btn btn-primary flex-grow-1">Request Code</button>
                            <a href="{% url 'register' %}" class="btn btn-outline-secondary">Register</a>
                        </div>
                    </form>

                    <form id="verify-code-form" method="post" action="{% url 'verify-login-code' %}">
                        {% csrf_token %}
                        <div id="verify-area" style="display:{% if show_verify %}block{% else %}none{% endif %}">
                            <input id="verify-email-input" type="hidden" name="email" value="{{ email|default:'' }}">
                            <div class="mb-3">
                                <input id="code-input" class="form-control" type="text" name="code" placeholder="Enter code" inputmode="numeric" autocomplete="one-time-code">
                            </div>
                            <div class="d-flex gap-2">
                                <button id="verify-code-btn" type="submit" class="btn btn-success flex-grow-1">Verify & Login</button>
                            </div>
                        </div>
                    </form>
                    <div id="email-login-feedback" class="mt-3"></div>
                </div>

                <script>
                function getCookie(name) {
                    const value = `; ${document.cookie}`;
                    const parts = value.split(`; ${name}=`);
                    if (parts.length === 2) {
                        return parts.pop().split(';').shift();
                    }
                    return '';
                }

                async function submitJson(form, data) {
                    const response = await fetch(form.action, {
                        method: 'POST',
                        headers: {
                            'X-CSRFToken': getCookie('csrftoken'),
                            'X-Requested-With': 'XMLHttpRequest'
                        },
                        body: new URLSearchParams(data)
                    });
                    const payload = await response.json();
                    if (!response.ok) {
                        throw new Error(payload.message || payload.status || 'Request failed');
                    }
                    return payload;
                }

                document.getElementById('request-code-form').addEventListener('submit', async function(e){
                    e.preventDefault();
                    const email = document.getElementById('email-input').value.trim();
                    if(!email) {
                        document.getElementById('email-login-feedback').innerHTML = '<div class="alert alert-warning">Enter your email.</div>';
                        return;
                    }
                    try {
                        const j = await submitJson(this, {email});
                        if(j.status === 'sent'){
                            document.getElementById('email-login-feedback').innerHTML = '<div class="alert alert-success">Code sent to '+email+'</div>';
                            document.getElementById('verify-email-input').value = email;
                            document.getElementById('verify-area').style.display = 'block';
                        }
                    } catch (error) {
                        document.getElementById('email-login-feedback').innerHTML = '<div class="alert alert-danger">'+error.message+'</div>';
                    }
                });

                document.getElementById('verify-code-form').addEventListener('submit', async function(e){
                    e.preventDefault();
                    const email = document.getElementById('email-input').value.trim();
                    const code = document.getElementById('code-input').value.trim();
                    if(!email || !code) {
                        document.getElementById('email-login-feedback').innerHTML = '<div class="alert alert-warning">Enter your email and code.</div>';
                        return;
                    }
                    try {
                        const j = await submitJson(this, {email, code});
                        if(j.status === 'ok'){
                            window.location = '{% url "official-dashboard" %}';
                        }
                    } catch (error) {
                        document.getElementById('email-login-feedback').innerHTML = '<div class="alert alert-danger">'+error.message+'</div>';
                        document.getElementById('verify-area').style.display = 'block';
                    }
                });
                </script>

    </div>
</div>

{% endblock %}
