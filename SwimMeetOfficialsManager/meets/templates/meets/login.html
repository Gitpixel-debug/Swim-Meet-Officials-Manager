{% extends "meets/layout.html" %}

{% block title %}Referee Login{% endblock %}

{% block body %}

<div class="container d-flex align-items-center justify-content-center" style="min-height:60vh">
    <div class="card p-4 shadow-sm" style="max-width:480px; width:100%" data-aos="fade-up">
        <h3 class="mb-3">Referee Login (Email code)</h3>

                {% if message %}
                    <div class="alert alert-warning">{{ message }}</div>
                {% endif %}

                <div id="email-login-area">
                    <div class="mb-3">
                        <input id="email-input" autofocus class="form-control" type="email" name="email" placeholder="Email address">
                    </div>
                    <div class="mb-3 d-flex gap-2">
                        <button id="request-code-btn" class="btn btn-primary flex-grow-1">Request Code</button>
                        <a href="{% url 'register' %}" class="btn btn-outline-secondary">Register</a>
                    </div>

                    <div id="verify-area" style="display:none">
                        <div class="mb-3">
                            <input id="code-input" class="form-control" type="text" name="code" placeholder="Enter code">
                        </div>
                        <div class="d-flex gap-2">
                            <button id="verify-code-btn" class="btn btn-success flex-grow-1">Verify & Login</button>
                        </div>
                    </div>
                    <div id="email-login-feedback" class="mt-3"></div>
                </div>

                <script>
                async function postForm(url, data){
                    const resp = await fetch(url, {method:'POST', headers:{'X-CSRFToken': '{{ csrf_token }}'}, body:new URLSearchParams(data)});
                    return resp.json();
                }

                document.getElementById('request-code-btn').addEventListener('click', async function(e){
                    e.preventDefault();
                    const email = document.getElementById('email-input').value.trim();
                    if(!email) return alert('Enter your email');
                    const res = await fetch('{% url "request-login-code" %}', {method:'POST', headers:{'X-CSRFToken':'{{ csrf_token }}'}, body:new URLSearchParams({email})});
                    const j = await res.json();
                    if(j.status === 'sent'){
                        document.getElementById('email-login-feedback').innerHTML = '<div class="alert alert-success">Code sent to '+email+'</div>';
                        document.getElementById('verify-area').style.display = 'block';
                    } else {
                        document.getElementById('email-login-feedback').innerHTML = '<div class="alert alert-danger">Failed to send code</div>';
                    }
                });

                document.getElementById('verify-code-btn').addEventListener('click', async function(e){
                    e.preventDefault();
                    const email = document.getElementById('email-input').value.trim();
                    const code = document.getElementById('code-input').value.trim();
                    if(!email||!code) return alert('Enter email and code');
                    const res = await fetch('{% url "verify-login-code" %}', {method:'POST', headers:{'X-CSRFToken':'{{ csrf_token }}'}, body:new URLSearchParams({email, code})});
                    const j = await res.json();
                    if(j.status === 'ok'){
                        window.location = '{% url "official-dashboard" %}';
                    } else {
                        document.getElementById('email-login-feedback').innerHTML = '<div class="alert alert-danger">'+(j.status||'Invalid code')+'</div>';
                    }
                });
                </script>

    </div>
</div>

{% endblock %}
