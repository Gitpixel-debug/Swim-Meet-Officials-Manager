{% extends 'meets/layout.html' %}
{% block body %}

<div class="container d-flex align-items-center justify-content-center" style="min-height:60vh">
    <div class="card p-4 shadow-sm" style="max-width:640px; width:100%" data-aos="fade-up">
        <h3 class="mb-3">Upload Officials CSV</h3>
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            {{ form.as_p }}
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-custom btn-referee">Upload</button>
                <a href="{% url 'session-home' session.id %}" class="btn btn-outline-secondary">Back</a>
            </div>
        </form>
    </div>
</div>

{% endblock %}
